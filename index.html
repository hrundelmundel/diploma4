<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/buyTicket/src/style.css">
  <title>buyticket</title>

<body>
 
  <div class="overlay">
    <div class="modal">
      <img src="/buyTicket/public/piccircle.png" alt="" class="modal__logo">
      <div class="modal-body">

      </div>
    </div>

  <!-- Модальне вікно -->

        <h1 class="header-title">FIND BEST EVENTS <br>

            </svg>
          </div>
          <div class="header-bottom-r">
             <select name="select" class="header-bottom-r__input">
                        <option value="value1" selected>All</option>
                        <option value="value2">en-us</option>
                      </select>
          </div>
      </header>

    </div>
  </div>
  <div class="main-wraper" style="background: url(./public/bdBOdy.png) no-repeat center/cover;">
    <div class="container">
      <main class="main main-cards">
       <div class="main-block"></div>
      </main>
      <div class="pagination">
        <div class="footer-pagination">
                <p class="footer-pagination-page active-page">1</p>
                <p class="footer-pagination-page">2</p>
                <p class="footer-pagination-page">3</p>
                <p class="footer-pagination-page">4</p>

                <p class="footer-pagination-page">6</p>

                <p class="footer-pagination-page">8</p>

      <footer class="footer">
        <p class="footer__text">© 2021 | All Rights Reserved | Developed with ❤️ by GoIT Students</p>
